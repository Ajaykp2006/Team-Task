<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Team Task Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                
                <div class="card glass-card rounded-4 border-0 mb-5">
                    <div class="card-body p-4 p-md-5">
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="fw-bold text-dark m-0">
                                <i class="bi bi-people-fill text-primary me-2"></i>Team Tasks
                            </h2>
                            <span class="badge bg-primary rounded-pill fs-6 shadow-sm" id="taskCount">0 Active Tasks</span>
                        </div>

                        <div class="input-group mb-4 shadow-sm rounded-3">
                            <select class="form-select border-secondary border-opacity-50 text-secondary fw-bold" id="userSelect" style="max-width: 140px;">
                                <option value="Alex" data-color="bg-primary">👨‍💻 Alex</option>
                                <option value="Sam" data-color="bg-warning text-dark">👩‍🎨 Sam</option>
                                <option value="Jordan" data-color="bg-danger">🦸‍♂️ Jordan</option>
                                <option value="Anyone" data-color="bg-secondary">👥 Anyone</option>
                            </select>

                            <input type="text" id="taskInput" class="form-control form-control-lg border-secondary border-opacity-50 bg-white bg-opacity-75" placeholder="Describe the task...">
                            
                            <button class="btn btn-dark px-4" id="addBtn" type="button">
                                Add Task
                            </button>
                        </div>

                        <div id="emptyState" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1"></i>
                            <p class="mt-2 fs-5">The board is clear. Great job, team!</p>
                        </div>

                        <ul class="list-group list-group-flush rounded-3 gap-2" id="todoList">
                            <!-- Tasks injected here via JS -->
                        </ul>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Link to your custom JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
